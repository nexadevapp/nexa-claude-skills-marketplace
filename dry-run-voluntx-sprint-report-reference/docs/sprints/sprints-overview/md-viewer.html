<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --accent: #3b82f6;
      --accent-light: #eff6ff;
      --green: #10b981;
      --green-light: #ecfdf5;
      --orange: #f59e0b;
      --orange-light: #fffbeb;
      --red: #ef4444;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      padding: 32px 40px;
      max-width: 900px;
      margin: 0 auto;
      font-size: 14px;
    }

    /* Headings */
    h1 { font-size: 26px; font-weight: 700; margin: 32px 0 16px; letter-spacing: -0.03em; color: var(--text); }
    h2 { font-size: 20px; font-weight: 600; margin: 28px 0 12px; letter-spacing: -0.02em; color: var(--text); border-bottom: 2px solid var(--border); padding-bottom: 8px; }
    h3 { font-size: 16px; font-weight: 600; margin: 20px 0 8px; color: var(--text); }
    h4 { font-size: 14px; font-weight: 600; margin: 16px 0 6px; color: var(--text); }

    /* Paragraphs & lists */
    p { margin: 10px 0; }
    ul, ol { margin: 10px 0; padding-left: 28px; }
    li { margin: 4px 0; }
    li > ul, li > ol { margin: 4px 0; }

    /* Horizontal rules */
    hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* Links */
    a { color: var(--accent); text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }

    /* Bold & emphasis */
    strong { font-weight: 600; }

    /* Blockquotes */
    blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 20px;
      margin: 16px 0;
      background: var(--accent-light);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-muted);
    }

    /* Code */
    code {
      background: #f1f5f9;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 12.5px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
      color: #c7254e;
    }

    pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 18px 20px;
      border-radius: var(--radius);
      overflow-x: auto;
      margin: 16px 0;
      line-height: 1.5;
    }

    pre code {
      background: none;
      color: inherit;
      padding: 0;
      font-size: 13px;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 16px 0;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: #f8fafc;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: #fafbfc; }

    /* Status-like content in tables */
    td strong { color: var(--accent); }

    /* Mermaid diagrams */
    .mermaid-container {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin: 16px 0;
      overflow-x: auto;
      text-align: center;
    }

    /* Images */
    img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
      margin: 12px 0;
    }

    /* Error state */
    .error {
      color: var(--red);
      padding: 40px;
      text-align: center;
      font-size: 14px;
    }

    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      body { padding: 20px 16px; }
      table { font-size: 12px; }
      th, td { padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <div id="content">
    <div class="loading"><div class="spinner"></div>Loading document...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });

    async function renderMermaidBlocks(container) {
      const codeBlocks = container.querySelectorAll('pre code.language-mermaid');
      for (const block of codeBlocks) {
        const pre = block.parentElement;
        const code = block.textContent;
        const wrapper = document.createElement('div');
        wrapper.className = 'mermaid-container';
        const id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
        try {
          const { svg } = await mermaid.render(id, code);
          wrapper.innerHTML = svg;
        } catch (e) {
          wrapper.textContent = 'Mermaid render error: ' + e.message;
        }
        pre.replaceWith(wrapper);
      }
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const file = params.get('file');

      if (!file) {
        document.getElementById('content').innerHTML = '<div class="error">No file specified. Use ?file=path/to/document.md</div>';
        return;
      }

      try {
        const resp = await fetch(file);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${file}`);
        const text = await resp.text();

        const el = document.getElementById('content');
        el.innerHTML = marked.parse(text);

        // Set page title from first h1
        const h1 = el.querySelector('h1');
        if (h1) document.title = h1.textContent + ' — VoluntX';

        await renderMermaidBlocks(el);

        // Notify parent frame for auto-resize
        if (window.parent !== window) {
          window.parent.postMessage({
            type: 'md-viewer-height',
            height: document.documentElement.scrollHeight
          }, '*');
        }
      } catch (e) {
        document.getElementById('content').innerHTML = `<div class="error">Failed to load document: ${e.message}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
