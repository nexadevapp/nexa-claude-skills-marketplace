name: "Build & Deploy: {{APP_NAME}}"
on:
  push:
    branches: [ "{{BRANCH}}" ]
    paths:
      - "{{PROJECT_PATH}}/**"

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: {{PROJECT_PATH}}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::{{AWS_ACCOUNT_ID}}:role/{{OIDC_ROLE_NAME}}
          aws-region: {{AWS_REGION}}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true

      - name: Create ECR repository if missing
        run: |
          aws ecr describe-repositories --repository-names {{ECR_REPO_NAME}} --region {{AWS_REGION}} \
            || aws ecr create-repository --repository-name {{ECR_REPO_NAME}} --region {{AWS_REGION}}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: {{PROJECT_PATH}}
          file: {{PROJECT_PATH}}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            {{AWS_ACCOUNT_ID}}.dkr.ecr.{{AWS_REGION}}.amazonaws.com/{{ECR_REPO_NAME}}:latest
            {{AWS_ACCOUNT_ID}}.dkr.ecr.{{AWS_REGION}}.amazonaws.com/{{ECR_REPO_NAME}}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Force ECS redeployment
        run: |
          aws ecs update-service \
            --cluster {{APP_NAME}}-cluster \
            --service {{APP_NAME}}-service \
            --force-new-deployment \
            --no-cli-pager
