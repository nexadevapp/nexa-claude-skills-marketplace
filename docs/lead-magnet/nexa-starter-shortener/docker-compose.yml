services:
  postgres:
    image: postgres:16-alpine
    container_name: lnk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lnk
      POSTGRES_PASSWORD: lnk
      POSTGRES_DB: lnk
    ports:
      - "5433:5432"
    volumes:
      - lnk_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lnk"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lnk_pg_data:
