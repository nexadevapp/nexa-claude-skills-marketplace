<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa Agentic Engineering — Workflow Explorer</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #181b24;
    --surface2: #1e2230;
    --border: #2a2e3b;
    --text: #e4e6ed;
    --text-dim: #8b8fa3;
    --accent: #6c8aff;
    --accent-glow: rgba(108,138,255,.15);
    --inception: #f59e0b;
    --elaboration: #8b5cf6;
    --construction: #3b82f6;
    --verification: #10b981;
    --transition: #ef4444;
    --setup: #06b6d4;
    --orchestration: #ec4899;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  .header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px; color: #fff;
  }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -.3px; }
  .header p { color: var(--text-dim); font-size: 13px; margin-left: auto; }

  /* Layout */
  .app { display: flex; height: calc(100vh - 89px); }

  /* Sidebar */
  .sidebar {
    width: 300px;
    min-width: 300px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .plugin-section { margin-bottom: 8px; }
  .plugin-header {
    padding: 8px 20px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
  }
  .phase-group { margin-bottom: 4px; }
  .phase-label {
    padding: 4px 20px;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: default;
  }
  .phase-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .skill-item {
    padding: 8px 20px 8px 40px;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left: 2px solid transparent;
    position: relative;
  }
  .skill-item:hover { background: var(--surface2); }
  .skill-item.active {
    background: var(--accent-glow);
    border-left-color: var(--accent);
    color: #fff;
  }
  .skill-item .cmd {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    color: var(--accent);
    opacity: .8;
  }
  .skill-item.active .cmd { opacity: 1; }

  /* Main Content */
  .main { flex: 1; overflow-y: auto; padding: 32px 40px; }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* View Tabs */
  .view-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
    background: var(--surface);
    border-radius: 10px;
    padding: 4px;
    width: fit-content;
  }
  .view-tab {
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s;
    color: var(--text-dim);
    border: none;
    background: none;
  }
  .view-tab:hover { color: var(--text); }
  .view-tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(108,138,255,.3);
  }

  /* Detail View */
  .detail-view { display: none; }
  .detail-view.active { display: block; }

  .skill-detail h2 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .skill-detail .phase-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .skill-detail .plugin-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .skill-detail .description {
    font-size: 15px;
    color: var(--text-dim);
    margin: 12px 0 24px;
    max-width: 640px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
  }
  .detail-card h4 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .detail-card p, .detail-card li {
    font-size: 13px;
    line-height: 1.7;
  }
  .detail-card ul { padding-left: 16px; }
  .detail-card code {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent);
  }
  .detail-card.full-width {
    grid-column: 1 / -1;
  }
  .dep-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    margin: 2px 4px 2px 0;
    cursor: pointer;
    transition: all .15s;
  }
  .dep-tag:hover { border-color: var(--accent); color: var(--accent); }
  .dep-tag .arrow { color: var(--text-dim); font-size: 10px; }

  /* Workflow View */
  .workflow-view { padding-bottom: 40px; }
  .workflow-view h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .workflow-view .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }

  .workflow-lane {
    position: relative;
    margin-bottom: 32px;
  }
  .lane-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .lane-header .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
  }
  .lane-header h3 { font-size: 15px; font-weight: 600; }
  .lane-header .count {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .lane-cards {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    position: relative;
    padding-left: 6px;
    border-left: 2px solid var(--border);
    margin-left: 5px;
    padding-top: 4px;
    padding-bottom: 4px;
  }
  .wf-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    min-width: 200px;
    max-width: 260px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .wf-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0,0,0,.3);
  }
  .wf-card .cmd {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .wf-card .name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .wf-card .desc { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
  .wf-card .output-badge {
    margin-top: 8px;
    font-size: 10px;
    padding: 2px 8px;
    background: var(--surface2);
    border-radius: 4px;
    display: inline-block;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--text-dim);
  }
  .wf-card .step-num {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 22px; height: 22px;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }

  /* Connector arrows between lanes */
  .lane-connector {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 24px;
    margin-left: 5px;
  }
  .lane-connector svg { opacity: .4; }

  /* Pipeline View */
  .pipeline-view h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .pipeline-view .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }

  .pipeline-steps { position: relative; }
  .pipeline-step {
    display: flex;
    gap: 20px;
    margin-bottom: 8px;
    align-items: flex-start;
  }
  .pipeline-step .step-marker {
    width: 40px;
    min-width: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .pipeline-step .step-circle {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
    flex-shrink: 0;
  }
  .pipeline-step .step-line {
    width: 2px;
    flex: 1;
    min-height: 20px;
    background: var(--border);
    margin-top: 4px;
  }
  .pipeline-step:last-child .step-line { display: none; }

  .pipeline-step .step-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    flex: 1;
    max-width: 600px;
    cursor: pointer;
    transition: all .15s;
    margin-bottom: 8px;
  }
  .pipeline-step .step-content:hover {
    border-color: var(--accent);
  }
  .pipeline-step .step-content h4 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pipeline-step .step-content .cmd {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    color: var(--accent);
  }
  .pipeline-step .step-content p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .pipeline-step .step-content .tags {
    margin-top: 8px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .pipeline-step .step-content .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  .tag-core { background: rgba(139,92,246,.15); color: #a78bfa; }
  .tag-nextjs { background: rgba(6,182,212,.15); color: #22d3ee; }
  .tag-skip { background: rgba(245,158,11,.15); color: #fbbf24; }
  .tag-isolated { background: rgba(16,185,129,.15); color: #34d399; }
  .tag-iteration { background: rgba(236,72,153,.15); color: #f472b6; }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    text-align: center;
  }
  .empty-state .icon {
    width: 64px; height: 64px;
    background: var(--surface);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin-bottom: 16px;
  }
  .empty-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .empty-state p { color: var(--text-dim); font-size: 13px; }

  /* Responsive */
  @media (max-width: 900px) {
    .sidebar { width: 240px; min-width: 240px; }
    .main { padding: 24px 20px; }
    .detail-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    .app { flex-direction: column; height: auto; }
    .sidebar { width: 100%; min-width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 240px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">N</div>
  <h1>Nexa Agentic Engineering</h1>
  <p>Workflow Explorer</p>
</div>

<div class="app">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main">
    <div class="view-tabs" id="viewTabs">
      <button class="view-tab active" data-view="detail">Skill Detail</button>
      <button class="view-tab" data-view="workflow">Full Workflow</button>
      <button class="view-tab" data-view="pipeline">Use Case Pipeline</button>
    </div>
    <div id="detailView" class="detail-view active"></div>
    <div id="workflowView" class="detail-view"></div>
    <div id="pipelineView" class="detail-view"></div>
  </main>
</div>

<script>
const DATA = {
  plugins: [
    { id: "core", name: "nexa-claude-core", label: "Core (Stack-Agnostic)", version: "1.0.0" },
    { id: "nextjs", name: "nexa-claude-nextjs", label: "Next.js Stack", version: "1.0.0" }
  ],
  phases: [
    { id: "inception", label: "Inception", color: "#f59e0b" },
    { id: "elaboration", label: "Elaboration", color: "#8b5cf6" },
    { id: "construction-spec", label: "Construction — Specification", color: "#3b82f6" },
    { id: "construction-design", label: "Construction — Design", color: "#3b82f6" },
    { id: "setup", label: "Setup", color: "#06b6d4" },
    { id: "construction-impl", label: "Construction — Implementation", color: "#3b82f6" },
    { id: "construction-test", label: "Construction — Testing", color: "#3b82f6" },
    { id: "construction-quality", label: "Construction — Quality", color: "#3b82f6" },
    { id: "verification", label: "Verification", color: "#10b981" },
    { id: "orchestration", label: "Orchestration", color: "#ec4899" },
    { id: "transition", label: "Transition", color: "#ef4444" }
  ],
  skills: [
    {
      id: "requirements", cmd: "/requirements", name: "Requirements",
      plugin: "core", phase: "inception",
      desc: "Gathers, organizes, and documents software requirements into structured catalogs with functional requirements (user stories), non-functional requirements (measurable quality attributes), and constraints.",
      output: "docs/requirements.md",
      produces: "Requirements catalog with FR, NFR, and Constraints tables",
      inputs: [],
      requires: [],
      triggers: ["write requirements", "create a PRD", "gather requirements", "write user stories", "define NFRs"]
    },
    {
      id: "entity-model", cmd: "/entity-model", name: "Entity Model",
      plugin: "core", phase: "elaboration",
      desc: "Creates entity model documents with Mermaid.js ER diagrams and attribute tables defining entities, relationships, data types, and validation rules.",
      output: "docs/entity_model.md",
      produces: "Mermaid ER diagram + entity attribute tables",
      inputs: ["docs/requirements.md"],
      requires: ["requirements"],
      triggers: ["create an entity model", "design a data model", "draw an ERD", "define database schema"]
    },
    {
      id: "use-case-diagram", cmd: "/use-case-diagram", name: "Use Case Diagram",
      plugin: "core", phase: "elaboration",
      desc: "Creates or updates PlantUML use case diagrams defining actors, use cases, and their relationships from requirements.",
      output: "docs/use_cases.puml",
      produces: "PlantUML use case diagram with actors and use cases",
      inputs: ["docs/requirements.md"],
      requires: ["requirements"],
      triggers: ["create a use case diagram", "draw a UML diagram", "map actors to use cases"]
    },
    {
      id: "use-case-spec", cmd: "/use-case-spec", name: "Use Case Specification",
      plugin: "core", phase: "construction-spec",
      desc: "Creates detailed use case specification documents with actors, preconditions, main success scenarios, alternative flows, postconditions, and business rules.",
      output: "docs/use_cases/UC-XXX.md",
      produces: "Complete use case specs with MSS, alternative flows, business rules",
      inputs: ["docs/entity_model.md", "docs/use_cases.puml", "docs/requirements.md"],
      requires: ["entity-model", "use-case-diagram"],
      triggers: ["write a use case", "specify a use case", "document system behavior"]
    },
    {
      id: "technical-task", cmd: "/technical-task", name: "Technical Task",
      plugin: "core", phase: "construction-spec",
      desc: "Creates technical task specification documents for engineering work with no user-facing scenario: configuration, cleanup, dependency updates, infrastructure, and developer experience improvements.",
      output: "docs/technical_tasks/TT-XXX.md",
      produces: "Technical task specs with acceptance criteria, affected areas, dependencies",
      inputs: [],
      requires: [],
      triggers: ["create a technical task", "set up the database", "bump a dependency"]
    },
    {
      id: "prioritize", cmd: "/prioritize", name: "Prioritize",
      plugin: "core", phase: "construction-spec",
      desc: "Analyzes use cases and technical tasks to recommend an implementation order based on dependencies, business value, risk, and foundational necessity.",
      output: "docs/priority.md",
      produces: "Phased implementation order with dependency graph and parallelization analysis",
      inputs: ["docs/requirements.md", "docs/entity_model.md", "docs/use_cases/", "docs/technical_tasks/"],
      requires: ["use-case-spec"],
      triggers: ["prioritize", "what should I work on next", "recommend next task", "rank tasks"]
    },
    {
      id: "design-screens", cmd: "/design-screens", name: "Design Screens",
      plugin: "core", phase: "construction-design",
      desc: "Creates screen design specifications as standalone HTML artifacts from the project wireframe. Uses Playwright to inspect wireframes and produces self-contained HTML with all screen states.",
      output: "docs/designs/UC-XXX-design.html",
      produces: "Self-contained HTML design artifact with all screen states (default, loading, empty, error, success)",
      inputs: ["docs/use_cases/UC-XXX.md", "docs/entity_model.md", "docs/wireframes/index.html"],
      requires: ["use-case-spec"],
      triggers: ["design a screen", "create a wireframe", "define the UI", "design the frontend"],
      notes: "Uses Playwright to inspect wireframes; saves snapshots to docs/snapshots/"
    },
    {
      id: "setup-env-profiles", cmd: "/setup-env-profiles", name: "Setup Environment Profiles",
      plugin: "nextjs", phase: "setup",
      desc: "Sets up environment profiles (local, dev, prod, test) with database connection strings and environment-specific configuration. Interactive — prompts for each profile.",
      output: ".env.local, .env.development, .env.production, .env.test",
      produces: "Four profile files with DATABASE_URL and environment variables",
      inputs: [],
      requires: [],
      triggers: ["set up environments", "configure profiles", "create .env files"]
    },
    {
      id: "prisma-migration", cmd: "/prisma-migration", name: "Prisma Migration",
      plugin: "nextjs", phase: "setup",
      desc: "Creates Prisma schema models and generates database migrations from the entity model.",
      output: "prisma/schema.prisma, prisma/migrations/",
      produces: "Prisma models with relations, validation, and constraints; database migration files",
      inputs: ["docs/entity_model.md"],
      requires: ["entity-model"],
      triggers: ["create a migration", "update the schema", "set up database tables"]
    },
    {
      id: "build-web-middleware", cmd: "/build-web-middleware", name: "Build Web Middleware",
      plugin: "nextjs", phase: "setup",
      desc: "Builds the Next.js middleware layer with authentication, authorization, security headers, and request context enrichment. Run before implementing use cases.",
      output: "middleware.ts, lib/auth/**",
      produces: "Authentication strategy, route protection rules, security headers, structured logging",
      inputs: ["docs/requirements.md", "docs/entity_model.md", "prisma/schema.prisma"],
      requires: ["entity-model", "prisma-migration"],
      triggers: ["set up middleware", "add auth middleware", "protect my routes"],
      notes: "Edge Runtime constraints: no Node.js APIs, no Prisma in middleware, only Edge-compatible libraries"
    },
    {
      id: "implement", cmd: "/implement", name: "Implement",
      plugin: "nextjs", phase: "construction-impl",
      desc: "Implements use cases and fixes bugs by creating Next.js pages, components, API route handlers, and server actions. Includes unit tests.",
      output: "app/**, components/**, app/api/**, unit tests",
      produces: "Full-stack Next.js implementation with App Router, Prisma queries, form handling, error states",
      inputs: ["Use case/TT/bug spec", "docs/entity_model.md", "design artifact"],
      requires: ["use-case-spec", "prisma-migration"],
      triggers: ["implement a use case", "fix a bug", "build the UI", "create an API endpoint"],
      notes: "Checks Definition of Ready; verifies with next build and vitest run"
    },
    {
      id: "vitest-test", cmd: "/vitest-test", name: "Vitest Integration Test",
      plugin: "nextjs", phase: "construction-test",
      desc: "Creates Vitest integration tests for Next.js API route handlers, server actions, and components using Testcontainers for external dependencies (real database).",
      output: "src/**/*.test.ts, src/test/global-setup.ts",
      produces: "Integration tests with real database via Testcontainers",
      inputs: ["Use case/TT spec", "implementation code"],
      requires: ["implement"],
      triggers: ["write integration tests", "test with a real database", "create Vitest integration tests"]
    },
    {
      id: "playwright-test", cmd: "/playwright-test", name: "Playwright E2E Test",
      plugin: "nextjs", phase: "construction-test",
      desc: "Creates Playwright browser-based end-to-end tests for Next.js pages covering navigation, form interactions, data display, and user workflows.",
      output: "e2e/**/*.spec.ts, e2e/global-setup.ts",
      produces: "E2E tests running in real browser against running app with real database",
      inputs: ["docs/use_cases/UC-XXX.md", "docs/designs/UC-XXX-design.html"],
      requires: ["implement", "design-screens"],
      triggers: ["write Playwright tests", "create e2e tests", "test in the browser"],
      notes: "Design artifact MUST exist. Runs in isolated fork context in /deliver-use-case."
    },
    {
      id: "code-quality", cmd: "/code-quality", name: "Code Quality",
      plugin: "nextjs", phase: "construction-quality",
      desc: "Runs ESLint and Prettier on TypeScript/JavaScript files to fix lint errors and enforce consistent formatting.",
      output: "Formatted code, no lint errors",
      produces: "Clean, consistently formatted codebase",
      inputs: [],
      requires: [],
      triggers: ["lint", "format code", "run code quality checks", "fix ESLint errors"],
      notes: "Applied after implementation, tests, or any code generation"
    },
    {
      id: "code-review", cmd: "/code-review", name: "Code Review",
      plugin: "core", phase: "verification",
      desc: "Reviews code changes for quality, correctness, security, and maintainability with an independent perspective. Runs in isolated fork context.",
      output: "Structured code review report",
      produces: "Critical, Important, Minor findings across Correctness, Security, Error Handling, Maintainability, Performance",
      inputs: ["Use case/TT ID or git diff"],
      requires: ["implement"],
      triggers: ["review the code", "check my changes", "review the implementation"],

// Build lookup maps
const skillMap = {};
DATA.skills.forEach(s => skillMap[s.id] = s);
const phaseMap = {};
DATA.phases.forEach(p => phaseMap[p.id] = p);

// Group skills by plugin then phase
function groupedSkills() {
  const groups = {};
  DATA.plugins.forEach(p => {
    groups[p.id] = {};
    DATA.phases.forEach(ph => groups[p.id][ph.id] = []);
  });
  DATA.skills.forEach(s => {
    if (groups[s.plugin] && groups[s.plugin][s.phase] !== undefined)
      groups[s.plugin][s.phase].push(s);
  });
  return groups;
}

// Render Sidebar
function renderSidebar() {
  const groups = groupedSkills();
  let html = '';
  DATA.plugins.forEach(plugin => {
    html += `<div class="plugin-section"><div class="plugin-header">${plugin.label}</div>`;
    DATA.phases.forEach(phase => {
      const skills = groups[plugin.id][phase.id];
      if (!skills.length) return;
      html += `<div class="phase-group">
        <div class="phase-label"><span class="phase-dot" style="background:${phase.color}"></span>${phase.label}</div>`;
      skills.forEach(s => {
        html += `<div class="skill-item" data-skill="${s.id}" onclick="selectSkill('${s.id}')">
          <span class="cmd">${s.cmd}</span> ${s.name}
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  });
  document.getElementById('sidebar').innerHTML = html;
}

// Render Detail View
function renderDetail(skill) {
  const s = skill;
  const phase = phaseMap[s.phase];
  const plugin = DATA.plugins.find(p => p.id === s.plugin);

  let reqHtml = '';
  if (s.requires.length) {
    s.requires.forEach(r => {
      const rs = skillMap[r];
      if (rs) reqHtml += `<span class="dep-tag" onclick="selectSkill('${r}')">${rs.cmd} <span class="arrow">&rarr;</span></span>`;
    });
  } else {
    reqHtml = '<span style="color:var(--text-dim);font-size:13px">None — can run independently</span>';
  }

  // Find dependents
  let depHtml = '';
  const dependents = DATA.skills.filter(sk => sk.requires.includes(s.id));
  if (dependents.length) {
    dependents.forEach(d => {
      depHtml += `<span class="dep-tag" onclick="selectSkill('${d.id}')"><span class="arrow">&rarr;</span> ${d.cmd}</span>`;
    });
  } else {
    depHtml = '<span style="color:var(--text-dim);font-size:13px">None</span>';
  }

  let triggersHtml = '';
  if (s.triggers) {
    triggersHtml = s.triggers.map(t => `<li>"${t}"</li>`).join('');
  }

  document.getElementById('detailView').innerHTML = `
    <div class="skill-detail">
      <h2>
        ${s.name}
        <span class="phase-badge" style="background:${phase.color}22;color:${phase.color}">${phase.label}</span>
        <span class="plugin-badge">${plugin.label}</span>
      </h2>
      <div class="description">${s.desc}</div>
      <div class="detail-grid">
        <div class="detail-card">
          <h4>Output</h4>
          <p><code>${s.output}</code></p>
          <p style="margin-top:8px">${s.produces}</p>
        </div>
        <div class="detail-card">
          <h4>Inputs</h4>
          ${s.inputs.length
            ? '<ul>' + s.inputs.map(i => `<li><code>${i}</code></li>`).join('') + '</ul>'
            : '<p style="color:var(--text-dim)">No specific inputs required</p>'
          }
        </div>
        <div class="detail-card">
          <h4>Prerequisites (must run first)</h4>
          <div style="margin-top:4px">${reqHtml}</div>
        </div>
        <div class="detail-card">
          <h4>Unlocks (depends on this)</h4>
          <div style="margin-top:4px">${depHtml}</div>
        </div>
        ${s.notes ? `<div class="detail-card full-width"><h4>Notes</h4><p>${s.notes}</p></div>` : ''}
        ${triggersHtml ? `<div class="detail-card full-width"><h4>Trigger Phrases</h4><ul>${triggersHtml}</ul></div>` : ''}
      </div>
    </div>
  `;
}

    { id: "verification", label: "Verification", color: "#10b981" },
    { id: "orchestration", label: "Orchestration", color: "#ec4899" },
    { id: "transition", label: "Transition — Deployment", color: "#ef4444" }
  ];

  let stepNum = 0;
  let html = `<div class="workflow-view">
    <h2>Full Workflow</h2>
    <p class="subtitle">End-to-end phases and skills in execution order. Click any card to see details.</p>`;

  orderedPhases.forEach((phase, pi) => {
    const skills = DATA.skills.filter(s => s.phase === phase.id);
    if (!skills.length) return;

    if (pi > 0) {
      html += `<div class="lane-connector">
        <svg width="20" height="20" viewBox="0 0 20 20"><path d="M10 2 L10 18 M5 13 L10 18 L15 13" stroke="${phase.color}" stroke-width="2" fill="none"/></svg>
      </div>`;
    }

    html += `<div class="workflow-lane">
      <div class="lane-header">
        <span class="dot" style="background:${phase.color}"></span>
        <h3>${phase.label}</h3>
        <span class="count">${skills.length} skill${skills.length > 1 ? 's' : ''}</span>
      </div>
      <div class="lane-cards">`;

    skills.forEach(s => {
      stepNum++;
      html += `<div class="wf-card" onclick="selectSkill('${s.id}'); switchView('detail')">
        <span class="step-num" style="background:${phase.color}">${stepNum}</span>
        <div class="cmd">${s.cmd}</div>
        <div class="name">${s.name}</div>
        <div class="desc">${s.desc.substring(0, 100)}${s.desc.length > 100 ? '...' : ''}</div>
        <div class="output-badge">${s.output.split(',')[0]}</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  html += `</div>`;
  document.getElementById('workflowView').innerHTML = html;
}

// State
let currentSkill = null;
let currentView = 'detail';

function selectSkill(id) {
  currentSkill = id;
  document.querySelectorAll('.skill-item').forEach(el => {
    el.classList.toggle('active', el.dataset.skill === id);
  });
  renderDetail(skillMap[id]);
  if (currentView !== 'detail') switchView('detail');
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  document.querySelectorAll('.detail-view').forEach(v => v.classList.remove('active'));
  document.getElementById(view + 'View').classList.add('active');
}
